name: Sync from oaslananka/helix

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync canonical to lab
    if: github.repository == 'oaslananka-lab/helix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
${tokenIndent}token: ${{ github.token }}

      - name: Configure upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/oaslananka/helix.git
          else
            git remote add upstream https://github.com/oaslananka/helix.git
          fi

      - name: Fetch upstream
        run: git fetch upstream --tags

      - name: Fast-forward main
        run: |
          git checkout main
          git merge upstream/main --ff-only

      - name: Push to lab
        run: |
          git push origin main
          git push origin --tags
