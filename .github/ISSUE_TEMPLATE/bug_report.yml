name: Bug Report
description: Report something broken in Helix
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Please include enough detail for maintainers to reproduce the issue.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - gateway
        - agent
        - shared
        - docs
        - CI/CD
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.1.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start the gateway
        2. Connect the agent
        3. Call a tool
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Node:
        pnpm:
        Docker:
