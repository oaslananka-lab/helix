name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - gateway
        - agent
        - shared
        - docs
        - CI/CD
        - new component
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
